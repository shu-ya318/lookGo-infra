services:
  database:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: lookGo-sql-server
    env_file:
      - .env
    ports:
      - "1433:1433"
    volumes:
      - sql-server-data:/var/opt/mssql
      - ./sql-scripts:/sql-scripts
    entrypoint: /bin/bash /sql-scripts/init-db.sh
    networks:
      - lookGo-network
    restart: always
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${MSSQL_SA_PASSWORD}", "-C", "-Q", "SELECT 1"]
      interval: 5s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: lookGo-redis
    ports:
      - "6379:6379"
    env_file:
      - .env
    environment:
      - REDIS_ARGS=--requirepass ${REDIS_PASSWORD}
      - REDISCLI_AUTH=${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - lookGo-network
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s

  backend:
    build:
      context: ../lookGo-backend
      args:
        - SETTINGS_FILE=${MVN_SETTINGS:-settings-public.xml}
    image: lookgo-backend:latest
    container_name: lookGo-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=database
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    env_file:
      - .env
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lookGo-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ../lookGo-frontend
    image: lookgo-frontend:latest
    container_name: lookGo-frontend
    ports:
      - "8081:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - lookGo-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-sf" ,"http://localhost/"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s


networks:
  lookGo-network:

volumes:
  sql-server-data:
  redis-data:
