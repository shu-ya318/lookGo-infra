services:
  database:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: lookGo-go-sql-server
    env_file:
      - .env
    ports:
      - "1433:1433"
    volumes:
      - sql-server-data:/var/opt/mssql
      - ./sql-scripts:/sql-scripts
    entrypoint: /bin/bash /sql-scripts/init-db.sh
    networks:
      - lookGo-go-network
    restart: always
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${MSSQL_SA_PASSWORD}", "-C", "-Q", "SELECT 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  backend:
    build:
      context: ../lookGo-backend
    image: lookgo-backend:latest
    container_name: lookGo-go-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=database
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    env_file:
      - .env
    depends_on:
      database:
        condition: service_healthy
    networks:
      - lookGo-go-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health/readiness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s

  frontend:
    build:
      context: ../lookGo-frontend
    image: lookgo-frontend:latest
    container_name: lookGo-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - lookGo-go-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s


networks:
  lookGo-go-network:

volumes:
  sql-server-data:
