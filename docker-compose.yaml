services:
  database:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: trtc-go-sql-server
    env_file:
      - .env
    ports:
      - "1433:1433"
    volumes:
      - sql-server-data:/var/opt/mssql
    networks:
      - trtc-go-network
    restart: always
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${MSSQL_SA_PASSWORD}", "-C", "-Q", "SELECT 1"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 60s

  backend:
    build:
      context: ../trtcgo-backend
    image: trtcgo-backend:latest
    container_name: trtc-go-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=database
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    env_file:
      - .env
    depends_on:
      database:
        condition: service_healthy
    networks:
      - trtc-go-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8080 && printf \"GET /actuator/health/readiness HTTP/1.0\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && timeout 3 cat <&3 | grep -q UP'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s

networks:
  trtc-go-network:

volumes:
  sql-server-data:
