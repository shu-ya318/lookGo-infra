services:
  database:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: lookGo-sql-server
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sql-server-data:/var/opt/mssql
      - ./sql-scripts:/sql-scripts
    entrypoint: /bin/bash /sql-scripts/init-db.sh
    networks:
      - lookGo-network
    restart: always
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${MSSQL_SA_PASSWORD}", "-C", "-Q", "SELECT 1"]
      interval: 5s
      timeout: 10s
      retries: 3
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: lookGo-redis
    ports:
      - "6379:6379"
    environment:
      - REDIS_ARGS=--requirepass ${REDIS_PASSWORD}
      - REDISCLI_AUTH=${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - lookGo-network
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s

  backend:
    build:
      context: ../lookGo-backend
      args:
        - SETTINGS_FILE=${MVN_SETTINGS:-settings-public.xml}
    image: lookgo-backend:latest
    container_name: lookGo-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=database
      - REDIS_HOST=redis
      - DB_NAME=${DB_NAME}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_TOKEN_EXPIRATION=${JWT_ACCESS_TOKEN_EXPIRATION}
      - JWT_REFRESH_TOKEN_EXPIRATION=${JWT_REFRESH_TOKEN_EXPIRATION}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      # - MAIL_USERNAME=${MAIL_USERNAME}
      # - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MVN_SETTINGS=settings-nexus.xml
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lookGo-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ../lookGo-frontend
    image: lookgo-frontend:latest
    container_name: lookGo-frontend
    ports:
      - "8081:80"
    environment:
      - BACKEND_URL=${BACKEND_URL}
    volumes:
      - ../lookGo-frontend/nginx.conf:/etc/nginx/conf.d/default.conf.template:ro
    command: /bin/sh -c "envsubst '$$BACKEND_URL' < /etc/nginx/conf.d/default.conf.template > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"    
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - lookGo-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-sf" ,"http://localhost/"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  lookGo-network:

volumes:
  sql-server-data:
  redis-data:
