apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: wait-for-sqlserver
          image: docker.io/library/lookgo-busybox:latest
          imagePullPolicy: IfNotPresent
          command:
            [
              "sh",
              "-c",
              "until nc -z sqlserver-service 1433; do echo waiting for sqlserver-service; sleep 2; done",
            ]
        - name: wait-for-redis
          image: docker.io/library/lookgo-busybox:latest
          imagePullPolicy: IfNotPresent
          command:
            [
              "sh",
              "-c",
              "until nc -z redis-service 6379; do echo waiting for redis-service; sleep 2; done",
            ]
      containers:
        - name: backend
          image: docker.io/library/lookgo-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "docker"
            - name: DB_HOST
              value: "sqlserver-service"
            - name: DB_PORT
              value: "1433"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: sqlserver-secret
                  key: db-name
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: sqlserver-secret
                  key: db-username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sqlserver-secret
                  key: db-password
            - name: REDIS_HOST
              value: "redis-service"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: redis-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: secret
            - name: JWT_ACCESS_TOKEN_EXPIRATION
              value: "900000"
            - name: JWT_REFRESH_TOKEN_EXPIRATION
              value: "604800000"
            # - name: MAIL_USERNAME
            #   valueFrom:
            #     secretKeyRef:
            #       name: backend-secret
            #       key: mail-username
            # - name: MAIL_PASSWORD
            #   valueFrom:
            #     secretKeyRef:
            #       name: backend-secret
            #       key: mail-password
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
